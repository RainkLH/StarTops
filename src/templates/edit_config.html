<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>配置编辑 - Startops</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .config-editor-container {
            padding: 20px;
            max-width: 900px;
            margin: 0 auto;
        }
        
        .editor-header {
            margin-bottom: 30px;
        }
        
        .editor-header h1 {
            font-size: 24px;
            color: #333;
            margin: 0 0 10px 0;
        }
        
        .editor-header p {
            color: #666;
            margin: 0;
        }
        
        .config-form {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        .form-group:last-of-type {
            margin-bottom: 0;
        }
        
        .form-label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .required {
            color: #dc3545;
        }
        
        .form-help {
            font-size: 12px;
            color: #666;
            margin-bottom: 8px;
            padding: 8px;
            background: #f9f9f9;
            border-left: 3px solid #007bff;
            border-radius: 2px;
        }
        
        .form-input,
        .form-select,
        .form-textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.2s;
            box-sizing: border-box;
        }
        
        .form-input:focus,
        .form-select:focus,
        .form-textarea:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.1);
        }
        
        .form-input[type="checkbox"] {
            width: auto;
            margin-right: 8px;
        }
        
        .form-textarea {
            resize: vertical;
            min-height: 120px;
        }
        
        .form-actions {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: #007bff;
            color: white;
        }
        
        .btn-primary:hover {
            background: #0056b3;
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #5a6268;
        }
        
        .alert {
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            display: none;
        }
        
        .alert.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        
        .alert.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="config-editor-container">
        <div class="editor-header">
            <h1>📝 配置文件编辑</h1>
            <p id="config-description">加载配置中...</p>
        </div>
        
        <div id="alert-container"></div>
        
        <div id="form-container" class="loading">
            加载配置中...
        </div>
    </div>
    
    <script>
        const serviceId = new URLSearchParams(window.location.search).get('service') || 'default';
        const configId = new URLSearchParams(window.location.search).get('config') || 'default';
        
        // 加载配置表单
        async function loadConfigForm() {
            try {
                const response = await fetch(`/api/config/${configId}/form`);
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('config-description').textContent = 
                        data.description || '编辑服务配置文件';
                    
                    const formContainer = document.getElementById('form-container');
                    formContainer.className = 'config-form';
                    formContainer.innerHTML = data.form_html;
                    
                    // 绑定表单提交事件
                    const form = formContainer.querySelector('form');
                    if (form) {
                        form.addEventListener('submit', handleFormSubmit);
                    }
                } else {
                    showAlert('error', '加载配置失败: ' + (data.message || '未知错误'));
                }
            } catch (error) {
                showAlert('error', '加载配置失败: ' + error.message);
                console.error('Failed to load config:', error);
            }
        }
        
        // 处理表单提交
        async function handleFormSubmit(event) {
            event.preventDefault();
            
            const form = event.target;
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());
            
            try {
                const response = await fetch(`/api/config/${configId}/save`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showAlert('success', result.message || '配置保存成功');
                    setTimeout(() => {
                        loadConfigForm();  // 重新加载表单
                    }, 1500);
                } else {
                    showAlert('error', result.message || '保存失败');
                }
            } catch (error) {
                showAlert('error', '保存失败: ' + error.message);
                console.error('Failed to save config:', error);
            }
        }
        
        // 显示提示信息
        function showAlert(type, message) {
            const container = document.getElementById('alert-container');
            const alert = document.createElement('div');
            alert.className = `alert ${type}`;
            alert.textContent = message;
            container.innerHTML = '';
            container.appendChild(alert);
            
            if (type === 'success') {
                setTimeout(() => {
                    alert.remove();
                }, 3000);
            }
        }
        
        // 初始化
        loadConfigForm();
    </script>
</body>
</html>
