<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>状态总览 - Startops</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: #f5f7fa;
            color: #333;
            height: 100vh;
            overflow: hidden;
        }

        .dashboard-layout {
            display: flex;
            height: 100vh;
        }

        .sidebar-tree {
            width: 240px;
            background: #4f3d54;
            color: #e5e7eb;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #111827;
        }

        .sidebar-title {
            padding: 16px 18px;
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            border-bottom: 1px solid #374151;
        }

        .tree-menu {
            padding: 10px 0;
            overflow-y: auto;
            flex: 1;
        }

        .sidebar-footer {
            padding: 12px;
            border-top: 1px solid #374151;
            background: #47364b;
        }

        .sidebar-restart-btn {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ef4444;
            border-radius: 8px;
            background: #dc2626;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
        }

        .sidebar-restart-btn:hover {
            background: #b91c1c;
            border-color: #dc2626;
        }

        .tree-item {
            padding: 10px 18px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #e5e7eb;
            transition: background 0.2s;
        }

        .tree-item:hover {
            background: #374151;
        }

        .tree-item.active {
            background: #4f46e5;
            color: #fff;
        }

        .tree-group {
            margin-top: 4px;
        }

        .tree-group-header {
            padding: 10px 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 14px;
            color: #e5e7eb;
            transition: background 0.2s;
        }

        .tree-group-header:hover {
            background: #374151;
        }

        .tree-group-header.active {
            background: #4f46e5;
            color: #fff;
        }

        .tree-group-items {
            display: none;
            padding-left: 12px;
        }

        .tree-group.expanded .tree-group-items {
            display: block;
        }

        .tree-sub-item {
            padding: 8px 18px 8px 28px;
            cursor: pointer;
            font-size: 13px;
            color: #d1d5db;
            transition: background 0.2s;
        }

        .tree-sub-item:hover {
            background: #374151;
        }

        .tree-sub-item.active {
            background: #4338ca;
            color: #fff;
        }

        .content-area {
            flex: 1;
            background: #f5f7fa;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .content-header {
            padding: 16px 20px;
            background: #fff;
            border-bottom: 1px solid #e5e7eb;
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .header-controls {
            display: none;
            align-items: center;
            gap: 12px;
            font-size: 13px;
            font-weight: 500;
            color: #374151;
        }

        .icon-refresh-btn {
            width: 32px;
            height: 32px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            background: #ffffff;
            color: #374151;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: background 0.2s, color 0.2s, border-color 0.2s;
        }

        .icon-refresh-btn:hover:not(:disabled) {
            background: #f3f4f6;
            border-color: #9ca3af;
        }

        .icon-refresh-btn:disabled {
            cursor: not-allowed;
            color: #9ca3af;
            background: #f9fafb;
        }

        .refresh-interval {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .refresh-interval input {
            width: 70px;
            padding: 4px 6px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 12px;
        }

        .content-body {
            flex: 1;
            padding: 20px;
            overflow: auto;
        }

        .view-panel {
            display: none;
        }

        .view-panel.active {
            display: block;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .stat-card.running {
            background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);
        }

        .stat-card.stopped {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
        }

        .stat-card.error {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
        }

        .stat-card-label {
            font-size: 14px;
            opacity: 0.9;
        }

        .stat-card-value {
            font-size: 32px;
            font-weight: 700;
            margin-top: 8px;
        }

        .table-wrapper {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: #f3f4f6;
        }

        th, td {
            padding: 12px 14px;
            text-align: left;
            border-bottom: 1px solid #e5e7eb;
            font-size: 13px;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-running {
            background: #d4edda;
            color: #155724;
        }

        .status-stopped {
            background: #fff3cd;
            color: #856404;
        }

        .status-error {
            background: #f8d7da;
            color: #721c24;
        }

        .status-unknown {
            background: #e2e3e5;
            color: #383d41;
        }

        .link-btn {
            border: none;
            background: #e5e7eb;
            color: #374151;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
        }

        .link-btn:hover {
            background: #d1d5db;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .btn {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .btn-primary {
            background: #007bff;
            color: white;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-warning {
            background: #ffc107;
            color: #333;
        }

        .toggle {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .toggle input {
            width: 40px;
            height: 18px;
        }

        .form-section {
            background: white;
            border-radius: 8px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .form-columns {
            display: grid;
            grid-template-columns: 20% 1fr;
            gap: 12px;
            margin-bottom: 12px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(330px, 1fr));
            gap: 12px;
            margin-bottom: 12px;
        }

        .form-grid input, .form-grid select, .form-columns input, .form-columns select {
            padding: 8px 10px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 13px;
        }

        .form-actions {
            display: flex;
            justify-content: flex-end;
        }

        .iframe-panel {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #e5e7eb;
            height: 420px;
        }

        .iframe-panel iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .empty-text {
            padding: 20px;
            text-align: center;
            color: #6b7280;
        }

        .terminal-wrapper {
            height: calc(100vh - 180px);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #e5e7eb;
        }

        .terminal-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar-tree">
            <div class="sidebar-title">Startops 仪表板</div>
            <div class="tree-menu">
                <div class="tree-item active" data-view="overview">📊 总览</div>
                <div class="tree-item" data-view="services">🧩 服务列表</div>

                <div class="tree-group" id="config-group">
                    <div class="tree-group-header" data-view="configs">
                        <span>📝 配置编辑</span>
                        <span>▸</span>
                    </div>
                    <div class="tree-group-items" id="config-submenu"></div>
                </div>

                <div class="tree-item" data-view="terminal">💻 Web 终端</div>

                <div class="tree-group" id="tools-group">
                    <div class="tree-group-header" data-view="tools">
                        <span>🧰 工具页面</span>
                        <span>▸</span>
                    </div>
                    <div class="tree-group-items" id="tools-submenu"></div>
                </div>
            </div>
            <div class="sidebar-footer">
                <button type="button" class="sidebar-restart-btn" onclick="promptRestartStartops()">重启当前节点 Startops</button>
            </div>
        </aside>

        <main class="content-area">
            <div class="content-header">
                <div id="content-title">总览</div>
                <div class="header-controls" id="services-refresh-controls">
                    <label class="toggle">
                        <input type="checkbox" id="services-auto-refresh" checked>
                        <span>自动刷新</span>
                    </label>
                    <div class="refresh-interval">
                        <span>间隔</span>
                        <input
                            type="number"
                            id="services-auto-refresh-interval"
                            min="1"
                            max="30"
                            value="5"
                        >
                        <span>秒</span>
                    </div>
                    <button
                        type="button"
                        class="icon-refresh-btn"
                        id="services-manual-refresh"
                        title="手动刷新"
                        aria-label="手动刷新"
                    >↻</button>
                </div>
            </div>
            <div class="content-body">
                <section class="view-panel active" id="view-overview">
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-card-label">总服务数</div>
                            <div class="stat-card-value" id="total-services">0</div>
                        </div>
                        <div class="stat-card running">
                            <div class="stat-card-label">运行中</div>
                            <div class="stat-card-value" id="running-services">0</div>
                        </div>
                        <div class="stat-card stopped">
                            <div class="stat-card-label">已停止</div>
                            <div class="stat-card-value" id="stopped-services">0</div>
                        </div>
                        <div class="stat-card error">
                            <div class="stat-card-label">异常</div>
                            <div class="stat-card-value" id="error-services">0</div>
                        </div>
                    </div>

                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>名称</th>
                                    <th>PID</th>
                                    <th>状态</th>
                                    <th>时间</th>
                                    <th>描述</th>
                                    <th>链接</th>
                                </tr>
                            </thead>
                            <tbody id="overview-table">
                                <tr><td colspan="6" class="empty-text">加载中...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </section>

                <section class="view-panel" id="view-services">
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>名称</th>
                                    <th>PID</th>
                                    <th>状态</th>
                                    <th>时间</th>
                                    <th>链接</th>
                                    <th>守护</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="services-table">
                                <tr><td colspan="6" class="empty-text">加载中...</td></tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="form-section">
                        <div class="form-columns">                            
                            <input type="text" id="add-service-name" placeholder="服务名称">
                            <input type="text" id="add-service-url" placeholder="服务URL">
                            <input type="number" id="add-service-interval" placeholder="健康检查间隔(秒)" min="1">
                            <input type="text" id="add-service-health" placeholder="健康检查URL">
                        </div>
                        <div class="form-grid">
                            <input type="text" id="add-service-app-dir" placeholder="应用目录">
                            <input type="text" id="add-service-app-file" placeholder="应用文件名">
                            <input type="text" id="add-service-executor" placeholder="启动器 (如 python/dotnet)">
                            <input type="text" id="add-service-app-args" placeholder="应用参数">
                            <input type="text" id="add-service-start" placeholder="启动命令（优先）">
                            <input type="text" id="add-service-stop" placeholder="停止命令（优先）">
                            <select id="add-service-keep-alive">
                                <option value="true" selected>自动保活</option>
                                <option value="false">不保活</option>
                            </select>
                            <input type="text" id="add-service-desc" placeholder="描述">
                        </div>
                        <div class="form-actions">
                            <button class="btn btn-primary" onclick="addService()">新增</button>
                        </div>
                    </div>
                </section>


                <section class="view-panel" id="view-terminal">
                    <div class="terminal-wrapper">
                        <iframe src="/terminal" class="terminal-iframe" title="Web 终端"></iframe>
                    </div>
                </section>
                <section class="view-panel" id="view-configs">
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>服务</th>
                                    <th>配置ID</th>
                                    <th>配置名称</th>
                                    <th>配置路径</th>
                                    <th>Meta路径</th>
                                    <th>描述</th>
                                </tr>
                            </thead>
                            <tbody id="configs-table">
                                <tr><td colspan="6" class="empty-text">加载中...</td></tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="form-section" style="margin-bottom: 16px;">
                        <div class="form-grid">
                            <input type="text" id="add-config-id" placeholder="配置ID">
                            <select id="add-config-service"></select>
                            <input type="text" id="add-config-name" placeholder="配置名称">
                            <input type="text" id="add-config-path" placeholder="配置文件路径">
                            <input type="text" id="add-config-meta" placeholder="Meta 文件路径">
                            <input type="text" id="add-config-desc" placeholder="描述">
                        </div>
                        <div class="form-actions">
                            <button class="btn btn-primary" onclick="addConfig()">新增</button>
                        </div>
                    </div>

                    <div class="iframe-panel">
                        <iframe id="config-editor-frame" src=""></iframe>
                    </div>
                </section>

                <section class="view-panel" id="view-tools">
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>服务</th>
                                    <th>页面名称</th>
                                    <th>描述</th>
                                    <th>链接</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="tools-table">
                                <tr><td colspan="5" class="empty-text">加载中...</td></tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="form-section" style="margin-bottom: 16px;">
                        <div class="form-grid">
                            <select id="add-page-service"></select>
                            <input type="text" id="add-page-name" placeholder="页面名称">
                            <input type="text" id="add-page-url" placeholder="页面URL">
                            <select id="add-page-icon"></select>
                            <input type="text" id="add-page-desc" placeholder="描述">
                        </div>
                        <div class="form-actions">
                            <button class="btn btn-primary" onclick="addPage()">新增</button>
                        </div>
                    </div>

                    <div class="iframe-panel">
                        <iframe id="tools-frame" src=""></iframe>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script>
        //#region 通用
        const PAGE_ICON_OPTIONS = [
            '🔧', '📊', '📝', '🔐', '💻', '⚙️', '📈', '🚀', '🎯', '📱', '🔔', '⏱️'
        ];

        const viewTitles = {
            overview: '总览',
            services: '服务列表',
            terminal: 'Web 终端',
            configs: '配置编辑',
            tools: '工具页面'
        };

        let servicesCache = {};
        let configsCache = [];
        let pagesCache = [];
        let currentViewId = 'overview';
        let servicesAutoRefreshTimer = null;

        function setActiveView(viewId) {
            currentViewId = viewId;
            document.querySelectorAll('.view-panel').forEach(panel => {
                panel.classList.toggle('active', panel.id === `view-${viewId}`);
            });
            document.getElementById('content-title').textContent = viewTitles[viewId] || '视图';

            document.querySelectorAll('.tree-item').forEach(item => {
                item.classList.toggle('active', item.dataset.view === viewId);
            });
            document.querySelectorAll('.tree-group-header').forEach(item => {
                item.classList.toggle('active', item.dataset.view === viewId);
            });

            toggleServicesAutoRefresh(viewId === 'overview' || viewId === 'services');
        }

        function clampRefreshInterval(value) {
            if (Number.isNaN(value)) {
                return 5;
            }
            return Math.min(30, Math.max(1, value));
        }

        function getServicesRefreshIntervalMs() {
            const input = document.getElementById('services-auto-refresh-interval');
            const value = clampRefreshInterval(Number.parseInt(input.value, 10));
            if (Number.parseInt(input.value, 10) !== value) {
                input.value = value;
            }
            return value * 1000;
        }

        function startServicesAutoRefresh() {
            stopServicesAutoRefresh();
            const checkbox = document.getElementById('services-auto-refresh');
            if (!checkbox.checked) {
                return;
            }
            servicesAutoRefreshTimer = setInterval(() => {
                refreshCurrentView();
            }, getServicesRefreshIntervalMs());
        }

        function stopServicesAutoRefresh() {
            if (servicesAutoRefreshTimer) {
                clearInterval(servicesAutoRefreshTimer);
                servicesAutoRefreshTimer = null;
            }
        }

        function toggleServicesAutoRefresh(visible) {
            const controls = document.getElementById('services-refresh-controls');
            controls.style.display = visible ? 'flex' : 'none';
            syncManualRefreshButtonState();
            if (visible) {
                startServicesAutoRefresh();
            } else {
                stopServicesAutoRefresh();
            }
        }

        function refreshCurrentView() {
            if (currentViewId === 'overview') {
                loadOverview();
            } else if (currentViewId === 'services') {
                loadServices();
            }
        }

        function syncManualRefreshButtonState() {
            const checkbox = document.getElementById('services-auto-refresh');
            const button = document.getElementById('services-manual-refresh');
            const visible = currentViewId === 'overview' || currentViewId === 'services';
            button.disabled = !visible || checkbox.checked;
        }

        function toggleGroup(groupId) {
            const group = document.getElementById(groupId);
            if (group) {
                group.classList.toggle('expanded');
            }
        }

        function openLink(url) {
            if (url) {
                window.open(url, '_blank');
            }
        }

        async function waitForStartopsBack(maxWaitMs = 90000, intervalMs = 1500) {
            const start = Date.now();
            while (Date.now() - start < maxWaitMs) {
                try {
                    const response = await fetch(`/api/health?_ts=${Date.now()}`, { cache: 'no-store' });
                    if (response.ok) {
                        return true;
                    }
                } catch (error) {
                    // 服务重启期间连接失败是预期行为
                }
                await new Promise(resolve => setTimeout(resolve, intervalMs));
            }
            return false;
        }

        async function restartStartops() {
            const response = await fetch('/api/system/restart', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ confirmation_text: '确认' })
            });

            const data = await response.json();
            if (!response.ok || !data.success) {
                throw new Error(data.message || '重启请求失败');
            }

            stopServicesAutoRefresh();
            alert('重启请求已发送，页面将等待服务恢复后自动刷新。');

            const online = await waitForStartopsBack();
            if (online) {
                location.reload();
                return;
            }

            alert('等待服务恢复超时，请稍后手动刷新页面。');
        }

        async function promptRestartStartops() {
            const text = prompt('这是高风险操作，将重启当前节点 Startops 服务。\n请输入“确认”继续：');
            if (text !== '确认') {
                alert('未输入“确认”，已取消重启。');
                return;
            }

            try {
                await restartStartops();
            } catch (error) {
                alert(`重启失败：${error.message || error}`);
            }
        }

        function refreshServiceSelect() {
            const configSelect = document.getElementById('add-config-service');
            const pageSelect = document.getElementById('add-page-service');
            const serviceIds = Object.keys(servicesCache || {});

            [configSelect, pageSelect].forEach(select => {
                select.innerHTML = '';

                if (!serviceIds.length) {
                    const option = document.createElement('option');
                    option.value = '';
                    option.textContent = '暂无服务';
                    select.appendChild(option);
                    return;
                }

                serviceIds.forEach(serviceId => {
                    const option = document.createElement('option');
                    option.value = serviceId;
                    option.textContent = servicesCache[serviceId]?.name || serviceId;
                    select.appendChild(option);
                });
            });
        }

        function statusClass(status) {
            const map = {
                Running: 'status-running',
                Stopped: 'status-stopped',
                Error: 'status-error',
                Unknown: 'status-unknown'
            };
            return map[status] || 'status-unknown';
        }

        function statusText(status) {
            const map = {
                Running: '运行中',
                Stopped: '已停止',
                Error: '异常',
                Unknown: '未知'
            };
            return map[status] || status;
        }

        function statusTimeText(status, lastCheckTime) {
            if (!lastCheckTime) {
                return '未知';
            }
            if (status === 'Running') {
                return `启动 于 ${lastCheckTime}`;
            }
            if (status === 'Stopped') {
                return `停止 于 ${lastCheckTime}`;
            }
            if (status === 'Error') {
                return `崩溃 于 ${lastCheckTime}`;
            }
            return `更新 于 ${lastCheckTime}`;
        }
        //#endregion

        //#region 总览
        async function loadOverview() {
            try {
                const response = await fetch('/api/dashboard');
                const data = await response.json();

                document.getElementById('total-services').textContent = data.total_services ?? 0;
                document.getElementById('running-services').textContent = data.running_services ?? 0;
                document.getElementById('stopped-services').textContent = data.stopped_services ?? 0;
                document.getElementById('error-services').textContent = data.error_services ?? 0;

                const tbody = document.getElementById('overview-table');
                tbody.innerHTML = '';

                if (data.services && data.services.length) {
                    data.services.forEach(service => {
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td>${service.name}</td>
                            <td>${service.pid ?? '?'}</td>
                            <td><span class="status-badge ${statusClass(service.status)}">${statusText(service.status)}</span></td>
                            <td>${statusTimeText(service.status, service.last_check_time)}</td>
                            <td>${service.description || ''}</td>
                            <td>
                                <button class="link-btn" onclick="openLink('${service.url}')">🔗</button>
                            </td>
                        `;
                        tbody.appendChild(row);
                    });
                } else {
                    tbody.innerHTML = '<tr><td colspan="6" class="empty-text">暂无服务信息</td></tr>';
                }
            } catch (error) {
                document.getElementById('overview-table').innerHTML = '<tr><td colspan="6" class="empty-text">加载失败</td></tr>';
            }
        }
        //#endregion

        //#region 服务列表
        async function loadServices() {
            try {
                const response = await fetch('/api/services');
                const data = await response.json();

                servicesCache = data.services || {};
                const list = Object.values(servicesCache);
                const tbody = document.getElementById('services-table');
                tbody.innerHTML = '';

                if (list.length) {
                    list.forEach(service => {
                        const guardChecked = service.guard_enabled ? 'checked' : '';
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td>${service.name}</td>
                            <td>${service.pid ?? '?'}</td>
                            <td><span class="status-badge ${statusClass(service.status)}">${statusText(service.status)}</span></td>
                            <td>${statusTimeText(service.status, service.last_check_time)}</td>
                            <td><button class="link-btn" onclick="openLink('${service.url}')">🔗</button></td>
                            <td>
                                <label class="toggle">
                                    <input type="checkbox" ${guardChecked} onchange="toggleGuard('${service.service_name}', this.checked)">
                                    <span>${service.guard_enabled ? '开启' : '关闭'}</span>
                                </label>
                            </td>
                            <td>
                                <div class="action-buttons">
                                    <button class="btn btn-primary" onclick="startService('${service.service_name}')">启动</button>
                                    <button class="btn btn-danger" onclick="stopService('${service.service_name}')">停止</button>
                                    <button class="btn btn-warning" onclick="restartService('${service.service_name}')">重启</button>
                                    <button class="btn btn-danger" onclick="deleteService('${service.service_name}')">删除</button>
                                </div>
                            </td>
                        `;
                        tbody.appendChild(row);
                    });
                } else {
                    tbody.innerHTML = '<tr><td colspan="7" class="empty-text">暂无服务信息</td></tr>';
                }

                refreshServiceSelect();
            } catch (error) {
                document.getElementById('services-table').innerHTML = '<tr><td colspan="7" class="empty-text">加载失败</td></tr>';
            }
        }

        async function toggleGuard(serviceId, enabled) {
            await fetch(`/api/service/${serviceId}/guard`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ enabled })
            });
            loadServices();
        }

        async function startService(serviceId) {
            await fetch(`/api/service/${serviceId}/start`, { method: 'POST' });
            loadServices();
            loadOverview();
        }

        async function stopService(serviceId) {
            if (window.parent.showConfirm) {
                window.parent.showConfirm(
                    '停止服务',
                    '确定要停止此服务吗？服务将会中断所有连接。',
                    async () => {
                        await fetch(`/api/service/${serviceId}/stop`, { method: 'POST' });
                        loadServices();
                        loadOverview();
                    },
                    true
                );
            } else if (confirm('确定要停止此服务吗？')) {
                await fetch(`/api/service/${serviceId}/stop`, { method: 'POST' });
                loadServices();
                loadOverview();
            }
        }

        async function restartService(serviceId) {
            if (window.parent.showConfirm) {
                window.parent.showConfirm(
                    '重启服务',
                    '确定要重启此服务吗？服务将会短暂不可用。',
                    async () => {
                        await fetch(`/api/service/${serviceId}/restart`, { method: 'POST' });
                        loadServices();
                        loadOverview();
                    },
                    true
                );
            } else if (confirm('确定要重启此服务吗？')) {
                await fetch(`/api/service/${serviceId}/restart`, { method: 'POST' });
                loadServices();
                loadOverview();
            }
        }

        async function addService() {
            const intervalValue = document.getElementById('add-service-interval').value.trim();
            const payload = {
                name: document.getElementById('add-service-name').value.trim(),
                url: document.getElementById('add-service-url').value.trim(),
                health_check_url: document.getElementById('add-service-health').value.trim(),
                executor: document.getElementById('add-service-executor').value.trim(),
                app_dir: document.getElementById('add-service-app-dir').value.trim(),
                app_file_name: document.getElementById('add-service-app-file').value.trim(),
                app_args: document.getElementById('add-service-app-args').value.trim(),
                start_cmd: document.getElementById('add-service-start').value.trim(),
                stop_cmd: document.getElementById('add-service-stop').value.trim(),
                health_check_interval: intervalValue ? Number(intervalValue) : 10,
                keep_alive: document.getElementById('add-service-keep-alive').value === 'true',
                description: document.getElementById('add-service-desc').value.trim()
            };

            await fetch('/api/service/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            loadServices();
            loadOverview();
        }

        async function deleteService(serviceId) {
            const doDelete = async () => {
                await fetch('/api/service/unregister', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ service_name: serviceId })
                });
                await loadServices();
                await loadOverview();
                await loadConfigs();
                await loadPages();
            };

            if (window.parent.showConfirm) {
                window.parent.showConfirm(
                    '删除服务',
                    `确定要删除服务「${serviceId}」吗？这只会移除注册信息，不会停止已运行的进程。`,
                    doDelete,
                    true
                );
            } else if (confirm(`确定要删除服务「${serviceId}」吗？这只会移除注册信息，不会停止已运行的进程。`)) {
                await doDelete();
            }
        }
        //#endregion

        //#region Web 终端
        // Web 终端当前通过 iframe 嵌入，无额外页面脚本。
        //#endregion

        //#region 配置编辑
        async function loadConfigs() {
            try {
                const response = await fetch('/api/configs');
                const data = await response.json();
                configsCache = data.configs || [];

                const tbody = document.getElementById('configs-table');
                tbody.innerHTML = '';

                if (configsCache.length) {
                    configsCache.forEach(cfg => {
                        const serviceName = servicesCache[cfg.service_name]?.name || cfg.service_name;
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td>${serviceName}</td>
                            <td>${cfg.config_id}</td>
                            <td>${cfg.config_name}</td>
                            <td>${cfg.config_file_path}</td>
                            <td>${cfg.meta_file_path || ''}</td>
                            <td>${cfg.description || ''}</td>
                        `;
                        tbody.appendChild(row);
                    });
                } else {
                    tbody.innerHTML = '<tr><td colspan="6" class="empty-text">暂无配置</td></tr>';
                }

                buildConfigMenu();
                refreshServiceSelect();
            } catch (error) {
                document.getElementById('configs-table').innerHTML = '<tr><td colspan="6" class="empty-text">加载失败</td></tr>';
            }
        }

        function buildConfigMenu() {
            const submenu = document.getElementById('config-submenu');
            submenu.innerHTML = '';

            const grouped = {};
            configsCache.forEach(cfg => {
                if (!grouped[cfg.service_name]) {
                    grouped[cfg.service_name] = [];
                }
                grouped[cfg.service_name].push(cfg);
            });

            Object.keys(grouped).forEach(serviceName => {
                const cfg = grouped[serviceName][0];
                const displayName = servicesCache[serviceName]?.name || serviceName;
                const item = document.createElement('div');
                item.className = 'tree-sub-item';
                item.textContent = displayName;
                item.dataset.configId = cfg.config_id;
                item.dataset.serviceName = serviceName;
                item.onclick = () => {
                    document.querySelectorAll('#config-submenu .tree-sub-item').forEach(sub => sub.classList.remove('active'));
                    item.classList.add('active');
                    setActiveView('configs');
                    openConfigEditor(cfg.config_id, serviceName);
                };
                submenu.appendChild(item);
            });
        }

        function openConfigEditor(configId, serviceId) {
            const frame = document.getElementById('config-editor-frame');
            if (configId) {
                frame.src = `/config/${configId}?config=${configId}&service=${serviceId}`;
            } else {
                frame.src = '';
            }
        }

        async function addConfig() {
            const payload = {
                config_id: document.getElementById('add-config-id').value.trim(),
                service_name: document.getElementById('add-config-service').value,
                config_name: document.getElementById('add-config-name').value.trim(),
                config_file_path: document.getElementById('add-config-path').value.trim(),
                meta_file_path: document.getElementById('add-config-meta').value.trim(),
                description: document.getElementById('add-config-desc').value.trim()
            };

            await fetch('/api/config/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            loadConfigs();
        }
        //#endregion

        //#region 工具页面
        async function loadPages() {
            try {
                const response = await fetch('/api/pages');
                const data = await response.json();
                pagesCache = data.pages || [];

                const tbody = document.getElementById('tools-table');
                tbody.innerHTML = '';

                if (pagesCache.length) {
                    pagesCache.forEach(page => {
                        const serviceName = servicesCache[page.service_name]?.name || page.service_name;
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td>${page.icon ? page.icon + ' ' : ''}${serviceName}</td>
                            <td>${page.page_name}</td>
                            <td>${page.description || ''}</td>
                            <td><button class="link-btn" onclick="openToolPage('${page.page_url}')">🔗</button></td>
                            <td><button class="btn btn-danger" onclick='deletePage(${JSON.stringify(page.service_name)}, ${JSON.stringify(page.page_name)})'>删除</button></td>
                        `;
                        tbody.appendChild(row);
                    });
                } else {
                    tbody.innerHTML = '<tr><td colspan="5" class="empty-text">暂无页面</td></tr>';
                }

                buildToolsMenu();
            } catch (error) {
                document.getElementById('tools-table').innerHTML = '<tr><td colspan="5" class="empty-text">加载失败</td></tr>';
            }
        }

        async function deletePage(serviceName, pageName) {
            const doDelete = async () => {
                await fetch('/api/page/unregister', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        service_name: serviceName,
                        page_name: pageName
                    })
                });
                loadPages();
            };

            if (window.parent.showConfirm) {
                window.parent.showConfirm(
                    '删除页面',
                    `确定要删除页面「${pageName}」吗？`,
                    doDelete,
                    true
                );
            } else if (confirm(`确定要删除页面「${pageName}」吗？`)) {
                await doDelete();
            }
        }

        function buildToolsMenu() {
            const submenu = document.getElementById('tools-submenu');
            submenu.innerHTML = '';

            pagesCache.forEach(page => {
                const item = document.createElement('div');
                item.className = 'tree-sub-item';
                item.textContent = (page.icon ? page.icon + ' ' : '') + page.page_name;
                item.onclick = () => {
                    document.querySelectorAll('#tools-submenu .tree-sub-item').forEach(sub => sub.classList.remove('active'));
                    item.classList.add('active');
                    setActiveView('tools');
                    openToolPage(page.page_url);
                };
                submenu.appendChild(item);
            });
        }

        function openToolPage(url) {
            const frame = document.getElementById('tools-frame');
            frame.src = url || '';
        }

        async function addPage() {
            const payload = {
                service_name: document.getElementById('add-page-service').value,
                page_name: document.getElementById('add-page-name').value.trim(),
                page_url: document.getElementById('add-page-url').value.trim(),
                icon: document.getElementById('add-page-icon').value.trim()|| '🔧',
                description: document.getElementById('add-page-desc').value.trim()
            };

            await fetch('/api/page/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            loadPages();
        }
        //#endregion

        //#region 初始化
        document.querySelectorAll('.tree-item').forEach(item => {
            item.addEventListener('click', () => {
                setActiveView(item.dataset.view);
            });
        });

        document.querySelectorAll('.tree-group-header').forEach(item => {
            item.addEventListener('click', () => {
                const groupId = item.parentElement.id;
                toggleGroup(groupId);
                setActiveView(item.dataset.view);
            });
        });

        async function init() {
            const iconSelect = document.getElementById('add-page-icon');
            iconSelect.innerHTML = '<option value="">-- 图标 --</option>';
            PAGE_ICON_OPTIONS.forEach(icon => {
                const opt = document.createElement('option');
                opt.value = icon;
                opt.textContent = icon;
                iconSelect.appendChild(opt);
            });

            setActiveView('overview');

            const autoRefreshCheckbox = document.getElementById('services-auto-refresh');
            const autoRefreshIntervalInput = document.getElementById('services-auto-refresh-interval');
            const manualRefreshButton = document.getElementById('services-manual-refresh');

            autoRefreshCheckbox.addEventListener('change', () => {
                syncManualRefreshButtonState();
                if (currentViewId === 'overview' || currentViewId === 'services') {
                    startServicesAutoRefresh();
                }
            });

            autoRefreshIntervalInput.addEventListener('change', () => {
                if (currentViewId === 'overview' || currentViewId === 'services') {
                    startServicesAutoRefresh();
                }
            });

            autoRefreshIntervalInput.addEventListener('input', () => {
                if (currentViewId === 'overview' || currentViewId === 'services') {
                    startServicesAutoRefresh();
                }
            });

            manualRefreshButton.addEventListener('click', () => {
                refreshCurrentView();
            });

            await loadOverview();
            await loadServices();
            await loadConfigs();
            await loadPages();
        }

        init();
        //#endregion
    </script>
</body>
</html>
